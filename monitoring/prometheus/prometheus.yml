global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spark-master'
    static_configs:
      - targets: ['spark-master:8080']

  - job_name: 'spark-worker'
    static_configs:
      - targets: ['spark-worker:8081']

  - job_name: 'spark-app'
    static_configs:
      - targets: ['spark-fraud-detection:4040']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:29092']
