name: bigdata-local

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 45s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command: >
      -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transaction_topic --partitions 6 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sender_state_topic --partitions 6 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic receiver_state_topic --partitions 6 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic risk_rules --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic fraud_alerts --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic metrics_windowed --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic pipeline_dead_letter --partitions 3 --replication-factor 1
      "

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: fraud-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_NUM_TOKENS: 16
      CASSANDRA_SEEDS: cassandra
      CASSANDRA_LISTEN_ADDRESS: auto
      CASSANDRA_BROADCAST_ADDRESS: auto
      CASSANDRA_RPC_ADDRESS: 0.0.0.0
      CASSANDRA_BROADCAST_RPC_ADDRESS: cassandra
      MAX_HEAP_SIZE: 256M
      HEAP_NEWSIZE: 64M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh 127.0.0.1 9042 -e 'describe keyspaces' >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - >
        cqlsh cassandra 9042 -e "CREATE KEYSPACE IF NOT EXISTS fraud_detection
        WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    restart: unless-stopped
    command: >
      /bin/bash -lc "
      mkdir -p /tmp/spark-events &&
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      "
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - spark_events:/tmp/spark-events
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    command: >
      /bin/bash -lc "
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --cores 2 --memory 1g spark://spark-master:7077
      "
    ports:
      - "8081:8081"
    volumes:
      - spark_events:/tmp/spark-events
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  spark-history:
    image: apache/spark:3.5.1
    container_name: spark-history
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    user: root
    command: >
      /bin/bash -lc "
      mkdir -p /tmp/spark-events &&
      chmod -R 777 /tmp/spark-events &&
      export SPARK_HISTORY_OPTS='
      -Dspark.history.fs.logDirectory=file:///tmp/spark-events
      -Dspark.history.ui.port=18080
      -Dspark.history.fs.update.interval=5s
      -Dspark.history.fs.cleaner.enabled=false
      ' &&
      exec /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
      "
    ports:
      - "18080:18080"
    volumes:
      - spark_events:/tmp/spark-events
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:18080 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  flink-app:
    build:
      context: .
      dockerfile: flink-app/Dockerfile
    container_name: flink-fraud-detection
    restart: on-failure
    depends_on:
      flink-jobmanager:
        condition: service_started
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLINK_JOBMANAGER_HOST: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOST: cassandra
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./fraud_pipeline:/opt/project/fraud_pipeline
      - ./flink-app:/opt/project/flink-app
      - ./model:/opt/project/model
    ports:
      - "8082:8081" # Flink Web UI proxy if needed

  streamlit:
    build:
      context: ./dashboard/streamlit
      dockerfile: Dockerfile
    container_name: streamlit
    restart: unless-stopped
    working_dir: /app
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./dashboard/streamlit:/app
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  flink-jobmanager:
    image: flink:1.17.1-scala_2.12
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    networks:
      - bigdata-network
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager

  flink-taskmanager:
    image: flink:1.17.1-scala_2.12
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    networks:
      - bigdata-network
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/fraud-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

volumes:
  kafka_data:
    driver: local
  cassandra_data:
    driver: local
  redis_data:
    driver: local
  spark_events:
    driver: local
  spark_checkpoints:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
